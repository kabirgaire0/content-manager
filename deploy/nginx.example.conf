# Alternative to the Caddyfile. Caddy is recommended (auto-HTTPS) but
# if you're already running nginx, this is the equivalent. You'll need
# to obtain certs yourself (certbot --nginx is the easy path).
#
# Replace content.example.com / api.content.example.com with yours.

upstream cm_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream cm_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# --- Web ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name content.example.com;

    ssl_certificate     /etc/letsencrypt/live/content.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/content.example.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Voice memo upload + browser audio playback may be a few MB at a time.
    client_max_body_size 60M;

    location / {
        proxy_pass http://cm_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.content.example.com;

    ssl_certificate     /etc/letsencrypt/live/api.content.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.content.example.com/privkey.pem;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    client_max_body_size 60M;

    location / {
        proxy_pass http://cm_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name content.example.com api.content.example.com;
    return 301 https://$host$request_uri;
}
